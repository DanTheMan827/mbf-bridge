name: "Build"

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

env:
  OPENSSL_VERSION: "3.4.1"
  NDK: r27c

jobs:
  app_version:
    name: "Get app version from tag"
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.set_version.outputs.app_version }}
    steps:
      - name: Set app version from tag
        id: set_version
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME:-${{ github.ref_name }}}"
          if [[ "$ref_name" =~ ^v([0-9]+\.[0-9]+\.[0-9]+([-.+][A-Za-z0-9.-]+)?)$ ]]; then
            version="${ref_name#v}"
            echo "app_version=$version" >> $GITHUB_OUTPUT
            echo "Detected version: $version"
          else
            echo "No valid version tag detected ($ref_name), skipping APP_VERSION."
          fi
  build:
    name: "Build for ${{ matrix.os }} ${{ matrix.arch }}"
    needs: app_version
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: i686-pc-windows-msvc
            artifact_name: "mbf-bridge-windows-x86"
            binary_extension: ".exe"

          - os: windows-latest
            arch: x86_64-pc-windows-msvc
            artifact_name: "mbf-bridge-windows-x64"
            binary_extension: ".exe"

          - os: ubuntu-latest
            arch: x86_64-unknown-linux-gnu
            artifact_name: "mbf-bridge-linux-x64"

          - os: ubuntu-latest
            arch: aarch64-linux-android
            artifact_name: "mbf-bridge-android-aarch64"

          - os: ubuntu-latest
            arch: x86_64-linux-android
            artifact_name: "mbf-bridge-android-x86_64"

          - os: macos-latest
            arch: x86_64-apple-darwin
            artifact_name: "mbf-bridge-macos-intel"

          - os: macos-latest
            arch: aarch64-apple-darwin
            artifact_name: "mbf-bridge-macos-arm"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      

      - name: Patch Cargo.toml version
        if: needs.app_version.outputs.app_version != ''
        shell: bash
        run: |
          echo "Patching Cargo.toml version to ${{ needs.app_version.outputs.app_version }}"
          sed -i.bak 's/^version = ".*"/version = "${{ needs.app_version.outputs.app_version }}"/' Cargo.toml
          head -n 10 Cargo.toml

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/
            target/
          key: ${{ matrix.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-${{ matrix.arch }}-cargo-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: ui

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.arch }}

      - name: Install dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Restore NDK cache (Android only)
        id: ndk_cache
        if: matrix.arch == 'aarch64-linux-android' || matrix.arch == 'x86_64-linux-android'
        uses: actions/cache/restore@v4
        with:
          path: ~/android-ndk-${{ env.NDK }}
          key: linux-android-ndk-${{ env.NDK }}

      - name: Install NDK (Android only)
        if: (matrix.arch == 'aarch64-linux-android' || matrix.arch == 'x86_64-linux-android') && steps.ndk_cache.outputs.cache-hit != 'true'
        run: |
          curl -L "https://dl.google.com/android/repository/android-ndk-${{ env.NDK }}-linux.zip" -o ndk.zip
          unzip ndk.zip -d ~
          rm ndk.zip

      - name: Save NDK cache (Android only)
        if: (matrix.arch == 'aarch64-linux-android' || matrix.arch == 'x86_64-linux-android') && steps.ndk_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/android-ndk-${{ env.NDK }}
          key: linux-android-ndk-${{ env.NDK }}

      - name: Export Android NDK path (Android only)
        if: matrix.arch == 'aarch64-linux-android' || matrix.arch == 'x86_64-linux-android'
        run: |
          export ANDROID_NDK_HOME=~/android-ndk-${{ env.NDK }}
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV

      - name: Create cargo config
        if: matrix.arch == 'aarch64-linux-android'
        run: |
          echo '[target.aarch64-linux-android]
          ar = "${{ env.ANDROID_NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          linker = "${{ env.ANDROID_NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang"' > /home/runner/.cargo/config.toml

      - name: Create cargo config
        if: matrix.arch == 'x86_64-linux-android'
        run: |
          echo '[target.x86_64-linux-android]
          ar = "${{ env.ANDROID_NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          linker = "${{ env.ANDROID_NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android31-clang"' > /home/runner/.cargo/config.toml

      - name: Build Release - without embedded ADB
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.arch }}

      - name: Upload release artifact - without embedded adb
        if: matrix.os != 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-release
          path: target/${{ matrix.arch }}/release/mbf_bridge${{ matrix.binary_extension }}

      - name: Build Release - with embedded ADB
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.arch }} --features embed-adb

      - name: Upload release artifact - with embedded adb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-release-embedded-adb
          path: target/${{ matrix.arch }}/release/mbf_bridge${{ matrix.binary_extension }}

      - name: Build debug - without embedded ADB
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          cargo build --target ${{ matrix.arch }}

      - name: Upload debug artifact - without embedded adb
        if: matrix.os != 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-debug
          path: target/${{ matrix.arch }}/debug/mbf_bridge${{ matrix.binary_extension }}

      - name: Build debug - with embedded ADB
        shell: bash
        run: |
          cargo build --target ${{ matrix.arch }} --features embed-adb

      - name: Upload debug artifact - with embedded adb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-debug-embedded-adb
          path: target/${{ matrix.arch }}/debug/mbf_bridge${{ matrix.binary_extension }}

  lipo:
    name: "Create macOS universal binary (${{ matrix.build_type }})"
    runs-on: macos-latest
    needs: build
    strategy:
      matrix:
        build_type: ["release", "debug"]
  
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: target/

      - name: Create universal binary
        run: |
          lipo -create -output ModsBeforeFriday.app/Contents/MacOS/mbf-bridge \
            "target/mbf-bridge-macos-intel-${{ matrix.build_type }}-embedded-adb/mbf_bridge" \
            "target/mbf-bridge-macos-arm-${{ matrix.build_type }}-embedded-adb/mbf_bridge"
          chmod +x ModsBeforeFriday.app/Contents/MacOS/mbf-bridge

      - name: Prepare macOS app bundle
        run: |
          mkdir build
          mv ModsBeforeFriday.app build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mbf-bridge-macos-universal-${{ matrix.build_type }}
          path: build

  release:
    permissions:
      contents: write

    # Only run if the workflow was triggered by a release creation event
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [build, lipo, app_version]
    if: needs.app_version.outputs.app_version != ''
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
        
      - name: Archive macOS and Linux builds
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          (cd mbf-bridge-macos-universal-release && zip -j ../release/mbf-bridge-macos-universal-release.zip ModsBeforeFriday.app)
          find -type f -name "mbf_bridge" -exec chmod +x {} \;
          
          package_zip() {
            local src_dir="$1"
            local dest_zip="$2"
            
            echo "Packaging: $src_dir -> release/${dest_zip}"
            if [ -d "$src_dir" ]; then
              (cd "$src_dir" && zip -r "../release/${dest_zip}" .)
            else
              echo "Directory $src_dir does not exist, skipping packaging ${dest_zip}"
            fi
          }

          find .
          
          for f in \
            mbf-bridge-linux-x64 \
            mbf-bridge-windows-x86 \
            mbf-bridge-windows-x64 \
            mbf-bridge-macos-universal \
          do
            package_zip "$f-release" "${f}-release.zip"
            package_zip "$f-release-embedded-adb" "${f}-release-embedded-adb.zip"
            package_zip "$f-debug" "${f}-debug.zip"
            package_zip "$f-debug-embedded-adb" "${f}-debug-embedded-adb.zip"
          done
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          draft: true
